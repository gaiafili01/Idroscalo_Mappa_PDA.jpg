<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idroscalo - Mappa PDA</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    overflow: hidden;
    font-family: Arial, Helvetica, sans-serif;
  }

  #viewer {
    width: 100%;
    height: 100vh;
    background: #1a1a1a;
  }

  #titolo {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    background: rgba(0,0,0,0.5);
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 16px;
    z-index: 10;
    pointer-events: none;
  }

  #stato {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #ccc;
    font-size: 12px;
    z-index: 10;
    background: rgba(0,0,0,0.4);
    padding: 4px 8px;
    border-radius: 4px;
  }
</style>
</head>
<body>

<div id="titolo">Idroscalo - Mappa PDA</div>
<div id="viewer"></div>
<div id="stato">Caricamento immagine...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
<script>
  // Dimensioni originali dell'immagine (in pixel)
  var LARGHEZZA = 1920;
  var ALTEZZA   = 1080;

  // Dimensione tile standard Zoomify (quasi sempre 256)
  var TILE_SIZE = 256;

  var viewer = OpenSeadragon({
    id: "viewer",
    prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
    showNavigator: true,
    navigatorPosition: "TOP_RIGHT",
    minZoomImageRatio: 0.8,
    maxZoomPixelRatio: 4,
    visibilityRatio: 1,
    constrainDuringPan: true,
    animationTime: 0.6,
    tileSources: {
      type: "zoomifytileservice",
      width: LARGHEZZA,
      height: ALTEZZA,
      tilesUrl: "TileGroup0/"
    }
  });

  viewer.addHandler('open', function() {
    document.getElementById('stato').style.display = 'none';
  });

  viewer.addHandler('open-failed', function() {
    document.getElementById('stato').innerText =
      "Errore: impossibile caricare le tile. Controlla che la cartella TileGroup0 e ImageProperties.xml siano nella stessa directory di questo file.";
  });
</script>

</body>
</html>
